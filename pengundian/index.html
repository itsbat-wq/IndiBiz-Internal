<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengundian Berhadiah – IndiBiz Borneo 2025</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <!-- Floating Particles -->
    <div class="particles-container" id="particles"></div>

    <!-- ========== MAIN LOTTERY SECTION ========== -->
    <section class="lottery-section" id="lotterySection">
        <!-- 3D Honda Vario Background -->
        <div class="vario-bg" id="varioBg">
            <iframe title="2016 - Honda Vario/Click 150" frameborder="0" allowfullscreen mozallowfullscreen="true"
                webkitallowfullscreen="true" allow="autoplay; fullscreen; xr-spatial-tracking"
                src="https://sketchfab.com/models/ad44edbac7a0455eb3e7cc4e28ea36a5/embed?autostart=1&autospin=0.3&ui_stop=0&ui_inspector=0&ui_infos=0&ui_watermark_link=0&ui_watermark=0&ui_ar=0&ui_help=0&ui_settings=0&ui_vr=0&ui_fullscreen=0&ui_annotations=0&camera=0&preload=1&transparent=1">
            </iframe>
        </div>

        <!-- Logo & Title -->
        <div class="lottery-header">
            <img src="../images/logo.png" alt="IndiBiz Logo" class="lottery-logo">
            <h1 class="lottery-title">
                <span class="title-line1">PENGUNDIAN BERHADIAH</span>
                <span class="title-line2">IndiBiz Borneo 2025</span>
            </h1>
            <p class="lottery-subtitle">🏆 Grand Prize: Honda Vario 150 🏆</p>
        </div>

        <!-- Decorative Ornaments -->
        <div class="ornament ornament-star ornament-tl"><i class="fas fa-star"></i></div>
        <div class="ornament ornament-star ornament-tr"><i class="fas fa-star"></i></div>
        <div class="ornament ornament-sparkle ornament-bl"><i class="fas fa-sparkles"></i></div>
        <div class="ornament ornament-sparkle ornament-br"><i class="fas fa-sparkles"></i></div>
        <div class="ornament ornament-gift ornament-ml"><i class="fas fa-gift"></i></div>
        <div class="ornament ornament-gift ornament-mr"><i class="fas fa-gift"></i></div>

        <!-- Slot Machine Box -->
        <div class="slot-container" id="slotContainer">
            <div class="slot-ribbon-left"><i class="fas fa-trophy"></i></div>
            <div class="slot-ribbon-right"><i class="fas fa-trophy"></i></div>
            <div class="slot-box">
                <div class="slot-reel" id="reel0"><span>A</span></div>
                <div class="slot-reel" id="reel1"><span>0</span></div>
                <div class="slot-reel" id="reel2"><span>0</span></div>
                <div class="slot-reel" id="reel3"><span>0</span></div>
                <div class="slot-reel" id="reel4"><span>0</span></div>
                <div class="slot-reel" id="reel5"><span>0</span></div>
            </div>
            <div class="slot-glow"></div>
        </div>

        <!-- START Button -->
        <button class="btn-start" id="btnStart" onclick="startLottery()">
            <i class="fas fa-play"></i>
            <span>START</span>
        </button>

        <!-- Status Text -->
        <p class="status-text" id="statusText">Tekan START untuk memulai pengundian</p>
    </section>

    <!-- ========== WINNER SECTION ========== -->
    <section class="winner-section" id="winnerSection" style="display:none;">
        <!-- Confetti Canvas -->
        <canvas id="confettiCanvas"></canvas>

        <div class="winner-content">
            <h2 class="winner-title">
                <i class="fas fa-trophy"></i> PEMENANG UNDIAN <i class="fas fa-trophy"></i>
            </h2>

            <!-- Winner Slot Display -->
            <div class="winner-slot-box" id="winnerSlotBox">
                <!-- Populated by JS -->
            </div>

            <!-- Winner Info -->
            <div class="winner-info" id="winnerInfo">
                <div class="winner-detail">
                    <span class="winner-label">Nomor IndiBiz:</span>
                    <span class="winner-value" id="winnerNo">-</span>
                </div>
                <div class="winner-detail">
                    <span class="winner-label">Nama Lengkap:</span>
                    <span class="winner-value" id="winnerName">-</span>
                </div>
                <div class="winner-detail">
                    <span class="winner-label">Kota:</span>
                    <span class="winner-value" id="winnerCity">-</span>
                </div>
                <div class="winner-detail">
                    <span class="winner-label">Total Kupon:</span>
                    <span class="winner-value" id="winnerKupon">-</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="winner-actions">
                <button class="btn-valid" onclick="validateWinner()">
                    <i class="fas fa-check-circle"></i> VALID
                </button>
                <button class="btn-selesai" onclick="finishLottery()">
                    <i class="fas fa-flag-checkered"></i> SELESAI
                </button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
