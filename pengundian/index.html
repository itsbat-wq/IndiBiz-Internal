<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengundian Berhadiah – IndiBiz Borneo 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <!-- Floating Particles -->
    <div class="particles-container" id="particles"></div>

    <!-- ========== MAIN LOTTERY SECTION ========== -->
    <section class="lottery-section" id="lotterySection">
        <!-- PCX 160 Background Image -->
        <div class="vario-bg" id="varioBg">
            <img src="./images/pcx 160 .webp" alt="Honda PCX 160">
        </div>

        <!-- Logos -->
        <div class="lottery-logos">
            <img src="./images/Telkom_Indonesia_logo.png" alt="Telkom Indonesia" class="partner-logo telkom">
            <img src="./images/logo.png" alt="IndiBiz" class="lottery-logo">
            <img src="./images/Danantara_Indonesia.png" alt="Danantara Indonesia" class="partner-logo danantara">
        </div>

        <!-- Title -->
        <div class="lottery-header">
            <h1 class="lottery-title">
                <span class="title-line1">Apresiasi Bayar Tagihan</span>
                <span class="title-line3">Pelanggan Smart, Bayar Cepat, Rezeki Hebat</span>
                <span class="title-line2">IndiBiz Borneo 2026</span>
            </h1>
            <p class="lottery-subtitle"><i class="fas fa-trophy"></i> Grand Prize: Honda PCX 160 <i
                    class="fas fa-trophy"></i></p>
        </div>

        <!-- Decorative Ornaments - More Festive -->
        <div class="ornament ornament-star ornament-tl"><i class="fas fa-star"></i></div>
        <div class="ornament ornament-star ornament-tr"><i class="fas fa-star"></i></div>
        <div class="ornament ornament-sparkle ornament-bl"><i class="fas fa-sparkles"></i></div>
        <div class="ornament ornament-sparkle ornament-br"><i class="fas fa-sparkles"></i></div>
        <div class="ornament ornament-gift ornament-ml"><i class="fas fa-gift"></i></div>
        <div class="ornament ornament-gift ornament-mr"><i class="fas fa-gift"></i></div>
        <!-- Additional festive ornaments -->
        <div class="ornament ornament-ribbon ornament-tl2"><i class="fas fa-ribbon"></i></div>
        <div class="ornament ornament-ribbon ornament-tr2"><i class="fas fa-ribbon"></i></div>
        <div class="ornament ornament-confetti ornament-bl2"><i class="fas fa-confetti"></i></div>
        <div class="ornament ornament-confetti ornament-br2"><i class="fas fa-confetti"></i></div>
        <div class="ornament ornament-medal ornament-ml2"><i class="fas fa-medal"></i></div>
        <div class="ornament ornament-medal ornament-mr2"><i class="fas fa-medal"></i></div>
        <div class="ornament ornament-crown ornament-tc"><i class="fas fa-crown"></i></div>
        <div class="ornament ornament-burst ornament-bc"><i class="fas fa-certificate"></i></div>
        <div class="ornament ornament-balloon ornament-tl3"><i class="fas fa-champagne-glasses"></i></div>
        <div class="ornament ornament-balloon ornament-tr3"><i class="fas fa-party-horn"></i></div>
        <div class="ornament ornament-star2 ornament-ml3"><i class="fas fa-star-half-stroke"></i></div>
        <div class="ornament ornament-star2 ornament-mr3"><i class="fas fa-wand-magic-sparkles"></i></div>

        <!-- Slot Machine Box -->
        <div class="slot-container" id="slotContainer">
            <div class="slot-ribbon-left"><i class="fas fa-trophy"></i></div>
            <div class="slot-ribbon-right"><i class="fas fa-trophy"></i></div>
            <div class="slot-box" id="slotBox">
                <div class="slot-reel" id="reel0"><span>1</span></div>
                <div class="slot-reel" id="reel1"><span>2</span></div>
                <div class="slot-reel" id="reel2"><span>3</span></div>
                <div class="slot-reel" id="reel3"><span>4</span></div>
                <div class="slot-reel" id="reel4"><span>5</span></div>
                <div class="slot-reel" id="reel5"><span>6</span></div>
                <div class="slot-reel" id="reel6"><span>7</span></div>
                <div class="slot-reel" id="reel7"><span>8</span></div>
                <div class="slot-reel" id="reel8"><span>9</span></div>
                <div class="slot-reel" id="reel9"><span>0</span></div>
            </div>
            <div class="slot-glow"></div>
        </div>

        <!-- START Button -->
        <button class="btn-start" id="btnStart" onclick="startLottery()">
            <i class="fas fa-play"></i>
            <span>START</span>
        </button>

        <!-- STOP Button (hidden initially) -->
        <button class="btn-stop" id="btnStop" onclick="stopLottery()" style="display:none;">
            <i class="fas fa-stop"></i>
            <span>STOP</span>
        </button>

        <!-- Status Text -->
        <p class="status-text" id="statusText">Tekan START untuk memulai pengundian</p>
    </section>

    <!-- ========== WINNER SECTION ========== -->
    <section class="winner-section" id="winnerSection" style="display:none;">
        <!-- Confetti Canvas -->
        <canvas id="confettiCanvas"></canvas>

        <div class="winner-content">
            <h2 class="winner-title">
                <i class="fas fa-trophy"></i> PEMENANG UNDIAN <i class="fas fa-trophy"></i>
            </h2>

            <!-- Winner Slot Display -->
            <div class="winner-slot-box" id="winnerSlotBox">
                <!-- Populated by JS -->
            </div>

            <!-- Winner Info -->
            <div class="winner-info" id="winnerInfo">
                <div class="winner-detail">
                    <span class="winner-label">No Internet:</span>
                    <span class="winner-value" id="winnerNo">-</span>
                </div>
                <div class="winner-detail">
                    <span class="winner-label">Nama Lengkap:</span>
                    <span class="winner-value" id="winnerName">-</span>
                </div>
                <div class="winner-detail">
                    <span class="winner-label">Kota:</span>
                    <span class="winner-value" id="winnerCity">-</span>
                </div>
                <div class="winner-detail">
                    <span class="winner-label">Total Kupon:</span>
                    <span class="winner-value" id="winnerKupon">-</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="winner-actions">
                <button class="btn-valid" onclick="validateWinner()">
                    <i class="fas fa-check-circle"></i> VALID
                </button>
                <button class="btn-selesai" onclick="finishLottery()">
                    <i class="fas fa-redo"></i> UNDI LAGI
                </button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
